<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loud League Exotics — Cherry Dosidos QR Print Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;font-family:Arial,sans-serif}
.screen{background:#111;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #333}
.screen h1{font-size:14px;letter-spacing:2px}
.screen small{color:#888;font-size:11px}
.print-btn{display:block;margin:14px auto;padding:12px 44px;background:#111;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:6px;cursor:pointer;letter-spacing:1px}
@media print{.screen,.print-btn{display:none!important}body{background:#fff}.a4-page{margin:0!important;box-shadow:none!important}}
.a4-page{width:210mm;height:297mm;background:#fff;margin:16px auto;display:grid;grid-template-columns:repeat(5,38.1mm);grid-template-rows:repeat(7,38.1mm);page-break-after:always;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.sticker{width:38.1mm;height:38.1mm;border:0.35mm dashed #aaa;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:1.5mm 1mm;background:#fff;position:relative;overflow:hidden}
.sticker::before{content:'';position:absolute;top:0;left:0;width:2.5mm;height:2.5mm;border-top:0.5mm solid #333;border-left:0.5mm solid #333}
.sticker::after{content:'';position:absolute;bottom:0;right:0;width:2.5mm;height:2.5mm;border-bottom:0.5mm solid #333;border-right:0.5mm solid #333}
.corner-tr{position:absolute;top:0;right:0;width:2.5mm;height:2.5mm;border-top:0.5mm solid #333;border-right:0.5mm solid #333}
.corner-bl{position:absolute;bottom:0;left:0;width:2.5mm;height:2.5mm;border-bottom:0.5mm solid #333;border-left:0.5mm solid #333}
.s-name{font-size:6pt;font-weight:900;text-transform:uppercase;text-align:center;color:#111;line-height:1.2;width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.qr-box{width:25.4mm;height:25.4mm;border:1px solid #111;padding:0.5mm;background:#fff;line-height:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qr-box img,.qr-box canvas{width:24mm!important;height:24mm!important}
.s-id{font-size:5.5pt;font-weight:700;color:#111;letter-spacing:0.3px;text-align:center;font-family:'Courier New',monospace}
.s-brand{font-size:5pt;font-weight:900;letter-spacing:1.5px;color:#555;text-transform:uppercase;text-align:center}
.empty{width:38.1mm;height:38.1mm;border:0.35mm dashed #eee}
</style>
</head>
<body>
<div class="screen">
  <h1>LOUD LEAGUE EXOTICS — CHERRY DOSIDOS QR PRINT SHEET</h1>
  <small>40 unique QR codes · 1.5in sticker · 1in QR · 2 pages</small>
</div>
<button class="print-btn" onclick="window.print()">PRINT ALL 40 QR STICKERS</button>
<div id="pages"></div>
<script>
const urls=["https://loudleagueexotics.com/products/oCJXEHu22rNtcplWSBSYXg.html","https://loudleagueexotics.com/products/FJsHCAGFH8RD0YGBtqxrCg.html","https://loudleagueexotics.com/products/7ye2EGOZAjhRmy6EypS6EQ.html","https://loudleagueexotics.com/products/j92GP6HmTny_LGL8d4ydFw.html","https://loudleagueexotics.com/products/uOih-wYKjpica8ZJdtv4HQ.html","https://loudleagueexotics.com/products/0jkcrkV3ukMnPSpQTX52UA.html","https://loudleagueexotics.com/products/sjhDLvEXMcwkG7fSQmEtgA.html","https://loudleagueexotics.com/products/N3Ehkqup_N1JgBh5eJX1aA.html","https://loudleagueexotics.com/products/AndIw-2MEWZmZDEDLF8vWg.html","https://loudleagueexotics.com/products/byyGeX-vCCK0HCFS9K7RkA.html","https://loudleagueexotics.com/products/rAzWZZ9WbybipkxUK84dpg.html","https://loudleagueexotics.com/products/Gn2uJR2erJt2gkniUSDFaw.html","https://loudleagueexotics.com/products/MuERCz93oQ0IFqz5yaDfyg.html","https://loudleagueexotics.com/products/FqRSzmu2PON0rMOESOm31g.html","https://loudleagueexotics.com/products/4PrFMN78jeRyXkrJSDYSwg.html","https://loudleagueexotics.com/products/mji60Q1DJOSTRM1pP1C3Vg.html","https://loudleagueexotics.com/products/Hb9AK6jgfqfpdcvrAmvj0A.html","https://loudleagueexotics.com/products/8a9khkJvXA4W690bp7U6Lg.html","https://loudleagueexotics.com/products/1WsQVJQd3zECk-DjN1jpMw.html","https://loudleagueexotics.com/products/W73dOUW5ukfR5ekB4m-hWg.html","https://loudleagueexotics.com/products/X12mj6ZUfRRUfCjtlyt4wQ.html","https://loudleagueexotics.com/products/OmTaaWjIP0E84ohaD_RO1w.html","https://loudleagueexotics.com/products/mlky9el1EtjMFEIV0WzVAA.html","https://loudleagueexotics.com/products/m6at_Rnviuy7QFoHjVEeZA.html","https://loudleagueexotics.com/products/QI2qSW0tEC9P55mg39So1Q.html","https://loudleagueexotics.com/products/-IpCG170qXDPsHR1WCPK_g.html","https://loudleagueexotics.com/products/SYEIv9u5e1APtLiLtOJImw.html","https://loudleagueexotics.com/products/oELW3WXuzpLz86jBKtviYA.html","https://loudleagueexotics.com/products/tD7WoLTnHPDp0cpf const labels=["Cherry Dosidos #01","Cherry Dosidos #02","Cherry Dosidos #03","Cherry Dosidos #04","Cherry Dosidos #05","Cherry Dosidos #06","Cherry Dosidos #07","Cherry Dosidos #08","Cherry Dosidos #09","Cherry Dosidos #10","Cherry Dosidos #11","Cherry Dosidos #12","Cherry Dosidos #13","Cherry Dosidos #14","Cherry Dosidos #15","Cherry Dosidos #16","Cherry Dosidos #17","Cherry Dosidos #18","Cherry Dosidos #19","Cherry Dosidos #20","Cherry Dosidos #21","Cherry Dosidos #22","Cherry Dosidos #23","Cherry Dosidos #24","Cherry Dosidos #25","Cherry Dosidos #26","Cherry Dosidos #27","Cherry Dosidos #28","Cherry Dosidos #29","Cherry Dosidos #30","Cherry Dosidos #31","Cherry Dosidos #32","Cherry Dosidos #33","Cherry Dosidos #34","Cherry Dosidos #35","Cherry Dosidos #36","Cherry Dosidos #37","Cherry Dosidos #38","Cherry Dosidos #39","Cherry Dosidos #40"];
const PER_PAGE=35;
const pagesDiv=document.getElementById('pages');
const totalPages=Math.ceil(urls.length/PER_PAGE);
for(let p=0;p<totalPages;p++){
  const page=document.createElement('div');
  page.className='a4-page';
  const start=p*PER_PAGE;
  const end=Math.min(start+PER_PAGE,urls.length);
  for(let i=start;i<end;i++){
    const cell=document.createElement('div');
    cell.className='sticker';
    cell.innerHTML=`<div class="corner-tr"></div><div class="corner-bl"></div><div class="s-name">Cherry Dosidos</div><div class="qr-box" id="qr_${i}"></div><div class="s-id">cherry-dosidos-${String(i+1).padStart(2,'0')}</div><div class="s-brand">Loud League Exotics</div>`;
    page.appendChild(cell);
  }
  const rem=PER_PAGE-(end-start);
  for(let r=0;r<rem;r++){const e=document.createElement('div');e.className='empty';page.appendChild(e);}
  pagesDiv.appendChild(page);
}
window.addEventListener('load',()=>{
  urls.forEach((url,i)=>{
    new QRCode(document.getElementById('qr_'+i),{text:url,width:91,height:91,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  });
});
</script>
</body>
</html>
